<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sutharson · 作品集</title>
  <style>
    /* 画布固定为编译时写死的逻辑分辨率（1200x820），不做 CSS 缩放——
       C 代码里的所有坐标、点击命中区域都是按这个分辨率硬编码的。
       之前用 max-width:100vw + height:auto 让画布跟着视口缩小，
       结果画布的“显示尺寸”和它的“像素尺寸”不一致，鼠标点击坐标换算
       就整个错位，越缩小越点不中东西，看起来像“网站坏了”。
       现在改成固定尺寸 + 页面级滚动条，尺寸不够就滚动查看，
       保证任何时候看到的画面都和点击的坐标是对应的。 */
    html, body {
      margin: 0; padding: 0; min-height: 100%;
      background: #161625;
    }
    #container {
      display: flex; flex-direction: column; align-items: center;
      width: 1200px; margin: 0 auto;
    }
    #status { color: #e0e0e0; font-family: "Microsoft YaHei", "PingFang SC", sans-serif; margin: 12px 0; }
    progress { width: 240px; }
    canvas { display: block; border: 0; outline: none; background: #161625; }
  </style>
</head>
<body>
  <div id="container">
    <div id="status">正在加载作品集……</div>
    <progress id="progress" value="0" max="100"></progress>
    <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
  </div>
  <script type="text/javascript">
    var statusEl = document.getElementById('status');
    var progressEl = document.getElementById('progress');
    var Module = {
      canvas: document.getElementById('canvas'),
      setStatus: function (text) {
        statusEl.textContent = text || '';
      },
      totalDependencies: 0,
      monitorRunDependencies: function (left) {
        this.totalDependencies = Math.max(this.totalDependencies, left);
        progressEl.value = this.totalDependencies - left;
        progressEl.max = this.totalDependencies;
        if (left === 0) {
          statusEl.style.display = 'none';
          progressEl.style.display = 'none';
        }
      }
    };
    Module.setStatus('正在加载作品集……');
    window.onerror = function () {
      Module.setStatus('加载失败，请打开浏览器控制台查看详情。');
    };
  </script>
  {{{ SCRIPT }}}
</body>
</html>
